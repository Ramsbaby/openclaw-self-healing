name: ShellCheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
        
      - name: Run ShellCheck
        run: |
          echo "🔍 Checking scripts..."
          # base64 인코딩된 파일 제외, 실제 쉘 스크립트만 검사
          for f in scripts/*.sh; do
            if head -c 4 "$f" | grep -q "^#!"; then
              echo "  checking $f"
              shellcheck -S warning -e SC2317 -x "$f"
            else
              echo "  skipping $f (not a shell script)"
            fi
          done
          echo "✅ All scripts passed!"
