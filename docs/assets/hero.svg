<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a2233"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ea043" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2ea043"/>
      <stop offset="70%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#heroBg)" rx="12"/>
  <rect width="800" height="200" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>
  <!-- Accent line -->
  <line x1="0" y1="3" x2="800" y2="3" stroke="url(#accentLine)" stroke-width="2.5" rx="12"/>
  <!-- Icon area: circuit pattern -->
  <circle cx="120" cy="100" r="45" fill="none" stroke="#2ea043" stroke-width="1" opacity="0.3"/>
  <circle cx="120" cy="100" r="30" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.4"/>
  <circle cx="120" cy="100" r="15" fill="#21262d" stroke="#a371f7" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" font-size="14" fill="#a371f7">&#x2695;</text>
  <!-- Lines from icon -->
  <line x1="165" y1="100" x2="195" y2="100" stroke="#30363d" stroke-width="1.5"/>
  <!-- Main text -->
  <text x="210" y="85" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#e6edf3">openclaw-self-healing</text>
  <text x="210" y="115" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#7d8590">Self-healing infrastructure for Claude Code AI agents</text>
  <text x="210" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#3fb950">&#x2713; 4-tier autonomous recovery</text>
  <text x="370" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#58a6ff">&#x2713; 64% incidents auto-resolved</text>
  <text x="570" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" fill="#a371f7">&#x2713; AI repair sessions</text>
  <!-- Bottom tag -->
  <rect x="210" y="155" width="80" height="22" rx="4" fill="#1a7f37" opacity="0.3"/>
  <text x="250" y="170" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#3fb950">macOS + Linux</text>
  <rect x="300" y="155" width="40" height="22" rx="4" fill="#1f6feb" opacity="0.3"/>
  <text x="320" y="170" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" fill="#58a6ff">MIT</text>
